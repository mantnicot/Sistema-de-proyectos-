services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oati}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oati_secret}
      POSTGRES_DB: ${POSTGRES_DB:-oati_proyectos}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oati"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://oati:oati_secret@postgres:5432/oati_proyectos
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-oati-prod-secret-change-me}
      DEBUG: "false"
      CORS_ORIGINS: http://localhost,http://localhost:4200
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
